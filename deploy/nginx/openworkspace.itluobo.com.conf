server {
    listen 80;
    server_name openworkspace.itluobo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name openworkspace.itluobo.com;

    ssl_certificate     /etc/letsencrypt/live/openworkspace.itluobo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openworkspace.itluobo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/openworkspace.access.log;
    error_log  /var/log/nginx/openworkspace.error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
