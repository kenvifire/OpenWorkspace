version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openworkspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ow_password}
      POSTGRES_DB: ${POSTGRES_DB:-openworkspace}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ow_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: openworkspace-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-ow_redis_password}
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-ow_redis_password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
